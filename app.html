<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alturas - Ear Training</title>
    <link rel="stylesheet" href="css/style.css">
    
    <!-- smplr for Soundfont playback -->
    <script src="https://cdn.jsdelivr.net/npm/smplr/dist/index.mjs" type="module"></script>
</head>
<body>
    <div class="container">
        <header>
            <a href="index.html" class="back-btn" style="text-decoration: none; font-size: 1.5rem; color: var(--text-color); margin-right: 1rem;">&#8592;</a>
            <h1 style="flex-grow: 1; text-align: center;">Alturas</h1>
            <div id="midi-status">MIDI: Disconnected</div>
        </header>
        
        <main>
            <section class="controls panel">
                <div class="form-group">
                    <label for="category-select">Category</label>
                    <select id="category-select">
                        <option value="major">Major Scales</option>
                        <option value="minor">Minor Scales</option>
                        <option value="diminished">Diminished Scales</option>
                        <option value="modes">Modes</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="exercise-select">Exercise</label>
                    <select id="exercise-select">
                        <!-- Populated dynamically -->
                    </select>
                </div>
                
                <button id="btn-play-ref">Play Reference</button>
            </section>
            
            <section class="info panel text-center">
                <h3 id="current-exercise-name">Select an exercise</h3>
                <div id="exercise-structure" class="structure-badge">T - S - T</div>
            </section>
            
            <section class="piano-container panel">
                <div id="piano-wrapper">
                    <!-- SVG generated by JS -->
                </div>
            </section>
            
            <section class="feedback panel">
                <h2>Feedback</h2>
                <div id="feedback-text">Select an exercise and play to start.</div>
            </section>
            
            <section class="progress panel">
                <h2>Progress (Mastery C)</h2>
                <ul id="progress-list">
                    <!-- Populated dynamically -->
                </ul>
            </section>
        </main>
    </div>

    <!-- Main Entry Point -->
    <script type="module" src="js/app.js"></script>
</body>
</html>

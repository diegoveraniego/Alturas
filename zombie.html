<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alturas - Story Mode POC</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        canvas {
            image-rendering: pixelated;
            width: 100% !important;
            height: 100% !important;
        }
        
        /* HUD Overlay */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        
        .top-hud {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        
        .health-bar {
            width: 200px;
            height: 20px;
            background: #333;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            overflow: hidden;
        }
        
        #health-fill {
            width: 100%;
            height: 100%;
            background: #4ade80;
            transition: width 0.2s, background 0.2s;
        }
        
        .power-bar {
            width: 200px;
            height: 10px;
            background: #222;
            border: 1px solid var(--accent);
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }
        
        #power-fill {
            width: 0%;
            height: 100%;
            background: #00ffff;
            transition: width 0.2s;
        }
        
        #score-display {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(74, 158, 255, 0.5);
        }
        
        #streak-display {
            font-size: 1rem;
            color: #ffaa00;
            margin-top: 5px;
        }
        
        .center-msg {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            font-weight: bold;
            color: #f87171;
            text-shadow: 0 0 20px #f87171;
            opacity: 0;
            transition: opacity 0.5s;
        }
        
        /* 2D Labels on top of 3D */
        #labels-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5;
            pointer-events: none;
        }
        
        .zombie-label {
            position: absolute;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.7);
            border: 1px solid #ff4444;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-family: inherit;
            white-space: nowrap;
        }
        
        .zombie-label .direction {
            color: #aaa;
            font-size: 0.7rem;
            display: block;
            text-align: center;
        }

        .back-btn {
            pointer-events: auto;
            text-decoration: none;
            color: white;
            background: #222;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            border: 1px solid var(--border-color);
        }
        
        #dialogue-box {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 600px;
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #ffaa00;
            border-radius: 8px;
            padding: 1.5rem;
            color: white;
            font-size: 1.2rem;
            font-family: 'Aporetic Sans Mono', 'Roboto Mono', monospace;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 20;
            text-align: center;
        }
    </style>
    <!-- Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/smplr/dist/index.mjs" type="module"></script>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="labels-container"></div>
    
    <div id="hud">
        <div class="top-hud">
            <div>
                <a href="index.html" class="back-btn">&#8592; Surrender</a>
                <div style="margin-top: 1rem; font-weight:bold;">HP</div>
                <div class="health-bar"><div id="health-fill"></div></div>
                <div style="margin-top: 0.5rem; font-weight:bold; font-size:0.8rem; color:#00ffff;">POWER (SPACE)</div>
                <div class="power-bar"><div id="power-fill"></div></div>
            </div>
            <div style="text-align:center;">
                <div id="score-display">Score: 0</div>
                <div id="streak-display">Streak: 0</div>
            </div>
            <div id="midi-status" style="pointer-events: auto; background: #222; padding: 0.5rem; border: 1px solid #444; border-radius: 4px;">MIDI: Waiting...</div>
        </div>
        <div id="game-over-msg" class="center-msg">GAME OVER</div>
        <div id="dialogue-box"></div>
    </div>

    <!-- Main Entry Point -->
    <script type="module">
        import { ZombieGame } from './js/zombie_game.js?v=5';
        window.addEventListener('DOMContentLoaded', () => {
            window.game = new ZombieGame();
        });
    </script>
</body>
</html>

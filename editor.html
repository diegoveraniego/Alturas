<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alturas - Map Editor</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #111; font-family: monospace; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        #editor-ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            padding: 1rem;
            box-sizing: border-box;
        }
        
        .panel {
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid #444;
            border-radius: 8px;
            padding: 1rem;
            pointer-events: auto;
            color: white;
        }
        
        .color-btn {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            border: 2px solid transparent;
            cursor: pointer;
            margin: 4px;
            display: inline-block;
        }
        .color-btn.active { border-color: white; transform: scale(1.1); }
        
        .tool-btn {
            background: #333;
            color: white;
            border: 1px solid #555;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 8px;
            width: 100%;
            font-family: inherit;
        }
        .tool-btn.active { background: #4ade80; color: black; font-weight: bold; }
        .tool-btn:hover:not(.active) { background: #444; }
        
        .back-btn {
            background: #a855f7;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 4px;
            font-weight: bold;
            pointer-events: auto;
            border: none;
            cursor: pointer;
            display: inline-block;
        }
    </style>
    <!-- Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="editor-ui">
        <div class="panel" style="width: 250px;">
            <h3 style="margin-top:0; color: #a855f7;">Map Editor</h3>
            <div style="margin-bottom: 1rem;">
                <p style="margin:0 0 5px 0; font-size:0.9rem;">Colors:</p>
                <div id="color-palette"></div>
            </div>
            
            <div style="margin-bottom: 1rem;">
                <p style="margin:0 0 5px 0; font-size:0.9rem;">Tools:</p>
                <button class="tool-btn active" id="tool-draw-wall" data-tool="wall">Draw Wall (Full)</button>
                <button class="tool-btn" id="tool-draw-half" data-tool="half">Draw Wall (Half)</button>
                <button class="tool-btn" id="tool-erase" data-tool="erase">Erase (Click block)</button>
            </div>
            
            <button class="tool-btn" id="btn-save" style="background:#2563eb; margin-top:20px;">💾 Save Map</button>
            <button class="tool-btn" id="btn-clear" style="background:#dc2626;">🗑️ Clear All</button>
        </div>
        
        <div>
            <a href="index.html" class="back-btn">⬅ Volver al Menú</a>
        </div>
    </div>

    <!-- Controls Help -->
    <div style="position:absolute; bottom:10px; left:10px; color:#aaa; font-size:0.8rem; z-index:10; background:rgba(0,0,0,0.5); padding:8px; border-radius:4px; pointer-events:none; font-family: monospace;">
        WASD: Move Camera | Click: Place/Remove Block
    </div>

    <script type="module" src="js/editor.js"></script>
</body>
</html>
